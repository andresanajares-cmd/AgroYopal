<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inicio</title>
    <link rel="shortcut icon" href="./media/images/logo.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="./media/images/logo.png" alt="Logo" width="30" height="24"
                    class="d-inline-block align-text-top" />
                AgroYopal
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="guias.html">Guias</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="noticias.html">Noticias</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            Mis Cultivos
                        </a>
                        <ul class="dropdown-menu">
                            <li>
                                <a class="dropdown-item " href="login.html">Iniciar Sesion</a>
                            </li>
                            <li>
                                <hr class="dropdown-divider"/>
                            </li>
                            <li><a class="dropdown-item active"  href="registrarse.html">Registrarse</a></li>
                        </ul>
                    </li>
                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Buscar" aria-label="Search" />
                    <button class="btn btn-outline-success" type="submit">
                        Buscar
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="text-center mb-4">
            <h2 class="text-success">Crea tu cuenta</h2>
            <p class="text-muted">Empieza a registrar tus cultivos de arroz, maíz, yuca y plátano en unos
                segundos.</p>
        </div>

        <form class=" registro mx-auto border rounded-3 p-4 shadow-sm bg-white">
            <div class="mb-3">
                <label for="nombreCompleto" class="form-label">Nombre completo</label>
                <input type="text" class="form-control" id="nombreCompleto" placeholder="Ej. Juan Pérez">
            </div>
            <div class="mb-3">
                <label for="correoRegistro" class="form-label">Dirección de correo electrónico</label>
                <input type="email" class="form-control" id="correoRegistro" aria-describedby="correoHelp"
                    placeholder="nombre@correo.com">
            </div>
            <div class="mb-3">
                <label for="finca" class="form-label">Vereda o finca <span class="text-muted">(opcional)</span></label>
                <input type="text" class="form-control" id="finca" placeholder="Ej. Vereda La Chaparrera">
            </div>
            <div class="mb-3">
                <label for="contrasenaRegistro" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="contrasenaRegistro">
            </div>
            <div class="mb-3">
                <label for="confirmarContrasena" class="form-label">Confirmar contraseña</label>
                <input type="password" class="form-control" id="confirmarContrasena">
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="aceptarTerminos">
                <label class="form-check-label" for="aceptarTerminos">Acepto los términos y condiciones</label>
            </div>
            <button type="submit" class="btn btn-success w-100">Crear cuenta</button>
            <div id="correoHelp" class="form-text text-center mt-3">¿Ya tienes cuenta? <a href="login.html">Inicia
                    sesión aquí</a></div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
